server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and note content requests to the Flask backend
    location /api/ {
        proxy_pass http://backend:5001;
        proxy_set_header Host $host;
    }

    location /notes/ {
        proxy_pass http://backend:5001;
        proxy_set_header Host $host;
    }

    # All other requests go to the SPA (React Router handles routing client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
