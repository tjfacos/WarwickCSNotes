<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ year_data.title }} - Warwick CS Notes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='themes.css') }}" rel="stylesheet">
</head>
<body class="light-theme">

    {% include "_navbar.html" %}

    <div class="container py-5">
        <h1 class="mb-4">{{ year_data.title }}</h1>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            {% for code, module in year_data.modules.items() %}
            {% set module = dict(module, **{"code": code}) %}
            <div class="col">
                <a href="/module/{{ module.code }}" class="text-decoration-none">
                    <div class="card h-100 shadow-sm light-theme">
                        <div class="card-body">
                            <h6 class="text-muted mb-1">{{ module.code }}</h6>
                            <h5 class="card-title">{{ module.name }}</h5>
                            <p class="card-text text-secondary">{{ module.tagline }}</p>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setTheme(theme) {
            // this scales up - just add new themes to remove list
            document.querySelectorAll('.light-theme, .dark-theme, .ifykyk-theme, .cs141-theme').forEach(el => {
                el.classList.remove('light-theme', 'dark-theme', 'ifykyk-theme', 'cs141-theme');
                el.classList.add(theme + '-theme');
            });
            localStorage.setItem('theme', theme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('theme');
            if (saved && saved !== 'light') setTheme(saved);
        });
    </script>
</body>
</html>
